name: Build and Push Dev Image

on:
  push:
    branches: [ dev ]  # Triggers on merges/pushes to dev

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run Tests
        run: |
          python -m pip install --upgrade pip
          python -m venv .venv
          . .venv/bin/activate
          pip install -r requirements.txt
          pytest

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Resolve wxstation image version
        id: wxstation_version
        run: |
            version=$(python3 - <<'PY'
            import tomllib
            from pathlib import Path

            pyproject = Path("pyproject.toml")
            data = tomllib.loads(pyproject.read_text(encoding="utf-8"))
            print(data["project"]["version"])
            PY
            )
            echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Build and Push WXStation Image (Dev)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            docker.io/travler7282/wxstation:${{ steps.wxstation_version.outputs.version }}-dev
            docker.io/travler7282/wxstation:${{ github.sha }}-dev
